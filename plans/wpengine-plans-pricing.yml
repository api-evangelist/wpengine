overages:
  - name: Visitor Overage
    description: Charged per 1,000 excess monthly visits beyond plan allocation.
    price: 2.00
    unit: per 1,000 visits
    currency: USD
  - name: Additional Sites
    description: Extra sites beyond plan allocation on Startup plan.
    price: 20.00
    unit: per site/month
    currency: USD
  - name: Additional Storage
    description: Extra storage beyond plan allocation.
    price: 1.00
    unit: per GB/month
    currency: USD

notes:
  - Annual billing provides approximately 16.7% savings (roughly 2 months free).
  - WP Engine counts visitors by unique IP addresses daily, which typically runs 20-50% higher than standard analytics tools.
  - Visitor counting methodology may cause unexpected overages if budgeting against Google Analytics data.
