name: WP Engine Plans and Pricing
description: WP Engine managed WordPress hosting plans with visit-based pricing tiers.
url: https://wpengine.com/pricing/
plans:
  - name: Startup
    description: Entry-level managed WordPress hosting for a single site.
    url: https://wpengine.com/pricing/
    price: 30.00
    unit: month
    currency: USD
    pricingModel: flat-rate
    billingCycle: monthly
    annualPrice: 360.00
    limits:
      - name: Sites
        value: 1
        unit: sites
      - name: Monthly Visits
        value: 25000
        unit: visits/month
      - name: Storage
        value: 10
        unit: GB
      - name: Bandwidth
        value: 50
        unit: GB
      - name: Local Environments
        value: 1
        unit: environments
    features:
      - Daily automated backups (40-day retention)
      - Free SSL certificates
      - Cloudflare CDN integration
      - 24/7 chat support
      - PHP version management
      - Staging environment
      - WP Engine CDN
      - Global edge security

  - name: Professional
    description: Managed WordPress hosting for up to 3 sites with phone support.
    url: https://wpengine.com/pricing/
    price: 55.00
